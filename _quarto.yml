project:
  type: website
  output-dir: docs            # served from main branch /docs on GitHub Pages

website:
  title: "Leo Carletto"
  site-url: "https://leocarletto.github.io"
  navbar:
    pinned: true
    right:
      - text: "About"
        file: about/index.qmd
      - text: "Blog"
        file: index.qmd
      - text: "Projects"
        file: projects/index.qmd
  page-footer:
    right:
      - icon: github
        href: https://github.com/leocarletto
      - icon: linkedin
        href: https://www.linkedin.com/in/leocarletto/

format:
  html:
    theme: [cosmo, styles.scss]
    toc: false
    include-after-body: lang-toggle.html

execute:
  freeze: auto